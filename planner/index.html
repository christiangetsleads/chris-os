<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHRIS·OS">
<link rel="apple-touch-icon" href="/icon-180.png">
<title>ChristianGetsLeads — Content Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0C11; --bg2:#0F121A; --panel:#141826;
    --gold:#E6B84D; --cyan:#34D6D0; --coral:#FF7A52;
    --text:#E9E7DF; --muted:#7E8597; --line:rgba(230,184,77,.16);
    --accent:#E6B84D; --accentglow:rgba(230,184,77,.5);
    --ok:#34D6D0; --warn:#FF7A52;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:"Space Mono",monospace;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:"Chakra Petch",sans-serif;font-weight:700;line-height:1.05;margin:0;letter-spacing:.01em;}
  .mono{font-family:"Space Mono",monospace;}
  .eyebrow{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px;}
  button{font-family:"Space Mono",monospace;cursor:pointer;border:none;background:none;color:inherit;}
  select,input,textarea{font-family:"Space Mono",monospace;font-size:14px;color:var(--text);}

  /* HUD background */
  .hud-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .hud-bg .grid{position:absolute;inset:-50%;
    background-image:linear-gradient(rgba(230,184,77,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(230,184,77,.04) 1px,transparent 1px);
    background-size:46px 46px;
    -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 25%,#000 0%,transparent 80%);
    mask-image:radial-gradient(ellipse 70% 60% at 50% 25%,#000 0%,transparent 80%);
    animation:drift 26s linear infinite;}
  @keyframes drift{to{transform:translate(46px,46px);}}
  .hud-bg .coreglow{position:absolute;left:50%;top:-12%;transform:translateX(-50%);width:900px;height:680px;
    background:radial-gradient(circle,rgba(230,184,77,.08) 0%,rgba(52,214,208,.04) 38%,transparent 64%);}
  .hud-bg .lines{position:absolute;inset:0;opacity:.3;background:repeating-linear-gradient(transparent 0 3px,rgba(0,0,0,.18) 3px 4px);}
  .bk{position:fixed;width:24px;height:24px;border-color:var(--accent);z-index:40;opacity:.55;pointer-events:none;}
  .bk.tl{top:14px;left:14px;border-top:2px solid;border-left:2px solid;}
  .bk.tr{top:14px;right:14px;border-top:2px solid;border-right:2px solid;}
  .bk.bl{bottom:14px;left:14px;border-bottom:2px solid;border-left:2px solid;}
  .bk.br{bottom:14px;right:14px;border-bottom:2px solid;border-right:2px solid;}

  /* Masthead */
  .masthead{position:sticky;top:0;z-index:20;background:rgba(10,12,17,.86);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(230,184,77,.12);}
  .masthead .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;padding-top:max(14px,env(safe-area-inset-top));flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:12px;font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:15px;letter-spacing:0.26em;color:var(--text);}
  .brand .home{color:var(--muted);text-decoration:none;font-size:17px;letter-spacing:0;transition:.15s;}
  .brand .home:hover{color:var(--accent);}
  .brand b{color:var(--accent);}
  .brand .sep{color:var(--muted);font-weight:400;letter-spacing:.1em;font-size:12px;}
  .brand .mod{color:var(--accent);letter-spacing:.2em;}
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .week-in{background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 11px;font-size:13px;}
  .week-in::placeholder{color:#5A6070;}
  .toggle{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .toggle button{padding:8px 14px;color:var(--muted);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;}
  .toggle button.on{background:var(--accent);color:#1A1407;font-weight:700;}
  .save-dot{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:0.08em;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:7px;}
  .save-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:#3A3F4D;}
  .save-dot.live{color:var(--cyan);}
  .save-dot.live::before{background:var(--cyan);box-shadow:0 0 8px var(--cyan);}

  /* Ratio meter */
  .meter-sec{position:relative;z-index:1;padding:24px 0 28px;border-bottom:1px solid var(--line);}
  .meter-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;}
  .meter-head .eyebrow{color:var(--accent);}
  .meter-head .total{font-family:"Space Mono",monospace;font-size:12px;color:var(--muted);letter-spacing:0.06em;}
  .meter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:16px;}
  .gauge{background:linear-gradient(160deg,var(--panel),rgba(10,12,17,.6));border:1px solid var(--line);border-radius:12px;padding:14px 16px;border-top:3px solid var(--c);}
  .gauge .gname{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
  .gauge .gcount{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:30px;margin-top:4px;line-height:1;}
  .gauge .gcount em{font-style:normal;font-size:15px;color:var(--muted);font-weight:500;}
  .gbar{height:7px;background:#0B0D13;border-radius:4px;margin-top:11px;overflow:hidden;}
  .gfill{height:100%;background:var(--c);border-radius:4px;box-shadow:0 0 10px -2px var(--c);transition:width .35s ease;}
  .gstat{font-family:"Space Mono",monospace;font-size:11px;margin-top:9px;letter-spacing:0.03em;}
  .gstat.good{color:var(--cyan);}
  .gstat.under{color:var(--gold);}
  .gstat.over{color:var(--coral);}

  /* Toolbar */
  .toolbar{position:relative;z-index:1;display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:22px 0 6px;}
  .btn{border:1px solid var(--line);border-radius:8px;padding:10px 16px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);background:rgba(20,24,38,.6);font-weight:700;transition:.14s;}
  .btn:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accentglow),0 0 24px -8px var(--accentglow);color:var(--accent);}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#1A1407;}
  .btn.primary:hover{background:#F2C75E;color:#1A1407;}
  .btn.ghost{border-color:var(--line);color:var(--muted);background:transparent;font-weight:400;}
  .btn.ghost:hover{color:var(--text);border-color:var(--muted);}
  .spacer{flex:1;}

  /* Board */
  .board{position:relative;z-index:1;padding:8px 0 80px;display:flex;flex-direction:column;gap:0;}
  .total.hit{color:var(--cyan);}
  .day-group{display:flex;flex-direction:column;gap:12px;padding:18px 0;border-top:1px solid var(--line);}
  .day-group:first-child{border-top:none;}
  .day-head{display:flex;align-items:center;gap:12px;}
  .day-name{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:15px;letter-spacing:.2em;color:var(--text);text-transform:uppercase;}
  .day-count{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.06em;color:var(--muted);}
  .day-add{margin-left:auto;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);border:1px solid var(--line);border-radius:7px;padding:6px 12px;background:transparent;transition:.14s;}
  .day-add:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accentglow);}
  .day-empty{font-family:"Space Mono",monospace;font-size:12px;color:#4f5564;font-style:italic;padding:2px 2px;}
  .piece{background:linear-gradient(160deg,var(--panel),rgba(10,12,17,.5));border:1px solid var(--line);border-radius:12px;overflow:hidden;border-left:4px solid var(--c);transition:border-color .2s,box-shadow .2s;}
  .piece:hover{box-shadow:0 0 30px -16px var(--c);}
  .piece.open{box-shadow:0 0 0 1px rgba(230,184,77,.18),0 18px 40px -22px #000;}
  .p-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;}
  .chip{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:4px 9px;border-radius:6px;white-space:nowrap;}
  .chip.day{background:rgba(255,255,255,.06);color:var(--text);font-weight:700;border:1px solid var(--line);}
  .chip.pillar{background:var(--c);color:#0A0C11;font-weight:700;}
  .p-head .ttl{flex:1;font-size:15px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .p-head .ttl.has{color:var(--text);}
  .status-dot{width:10px;height:10px;border-radius:50%;background:#3A3F4D;flex-shrink:0;}
  .status-dot.scripted{background:var(--gold);box-shadow:0 0 8px var(--gold);}
  .status-dot.ready{background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
  .caret{font-family:"Space Mono",monospace;color:var(--muted);font-size:13px;transition:transform .15s;}
  .piece.open .caret{transform:rotate(90deg);color:var(--accent);}

  .p-body{display:none;padding:4px 18px 20px;border-top:1px solid var(--line);}
  .piece.open .p-body{display:block;}
  .meta-row{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 4px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field.grow{flex:1;min-width:160px;}
  .field label{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;gap:8px;align-items:baseline;}
  .sel,.txt,.area{border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:var(--bg2);color:var(--text);width:100%;}
  .sel:focus,.txt:focus,.area:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 1px var(--accentglow);}
  .area{resize:vertical;line-height:1.55;min-height:60px;}
  .area.script{min-height:150px;}
  .counter{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:0.04em;color:var(--muted);}
  .counter.good{color:var(--cyan);}
  .counter.warn{color:var(--coral);}
  .flag{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:0.04em;color:var(--coral);}
  .hint{font-size:13px;color:var(--muted);font-style:italic;margin:3px 0 0;}
  .p-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px;flex-wrap:wrap;}
  .statseg{display:flex;gap:6px;}
  .statseg button{border:1px solid var(--line);border-radius:7px;padding:6px 11px;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);background:transparent;}
  .statseg button.on{background:var(--accent);color:#1A1407;border-color:var(--accent);font-weight:700;}
  .del{color:var(--coral);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:6px 4px;}
  .del:hover{text-decoration:underline;}

  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty p{font-style:italic;}

  /* Toast */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);color:var(--text);padding:12px 20px;border-radius:10px;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:0.06em;opacity:0;pointer-events:none;transition:.25s;z-index:50;border:1px solid var(--accent);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Pillar Manager */
  .pil-modal{position:fixed;inset:0;z-index:9998;display:none;align-items:flex-start;justify-content:center;background:rgba(10,12,17,.92);padding:20px 16px;overflow-y:auto;}
  .pil-modal.on{display:flex;}
  .pil-card{width:min(560px,96vw);background:linear-gradient(160deg,#141826,rgba(10,12,17,.8));border:1px solid rgba(230,184,77,.22);border-top:2px solid var(--accent);border-radius:16px;padding:28px 24px;margin:auto;}
  .pil-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .pil-hd h2{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:15px;letter-spacing:.2em;text-transform:uppercase;color:var(--text);margin:0;}
  .pil-close-btn{font-size:18px;color:var(--muted);cursor:pointer;padding:4px 10px;border-radius:5px;transition:.12s;line-height:1;}
  .pil-close-btn:hover{color:var(--text);}
  .pil-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .pil-row{display:flex;align-items:center;gap:10px;padding:11px 12px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:8px;transition:.12s;}
  .pil-row.pil-editing{border-color:var(--accent);}
  .pil-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
  .pil-info{flex:1;min-width:0;}
  .pil-lbl{font-size:13px;font-weight:700;color:var(--text);}
  .pil-rl{font-size:11px;letter-spacing:.04em;color:var(--muted);}
  .pil-cnt{font-size:11px;color:var(--muted);white-space:nowrap;margin-right:2px;}
  .pil-act{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:5px;border:1px solid var(--line);color:var(--muted);background:transparent;cursor:pointer;transition:.12s;}
  .pil-act:hover{color:var(--accent);border-color:var(--accent);}
  .pil-act.del:hover{color:var(--coral);border-color:var(--coral);}
  .pil-divider{border:none;border-top:1px solid var(--line);margin:4px 0 20px;}
  .pil-form-title{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
  .pil-form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .pil-form-row .field{flex:1;min-width:140px;}
  .palette{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:.12s;flex-shrink:0;outline:2px solid transparent;outline-offset:3px;}
  .swatch.on{outline-color:rgba(255,255,255,.75);}
  .swatch:hover{transform:scale(1.18);}
  .types-area{margin-bottom:12px;}
  .types-lbl{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;}
  .type-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:20px;}
  .type-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:5px;padding:4px 8px;font-family:"Space Mono",monospace;}
  .type-rx{padding:0 1px;color:var(--muted);font-size:14px;line-height:1;cursor:pointer;background:none;border:none;font-family:inherit;}
  .type-rx:hover{color:var(--coral);}
  .type-add-row{display:flex;gap:8px;align-items:center;}
  .type-add-row .txt{flex:1;}
  .tgt-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;margin-bottom:14px;}
  .tgt-row .field{flex:1;min-width:100px;}
  .tgt-inp{border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:var(--bg2);color:var(--text);width:100%;font-family:"Space Mono",monospace;font-size:14px;}
  .tgt-inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 1px var(--accentglow);}
  .pil-form-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}

  @media (max-width:760px){
    .masthead .wrap{padding:12px 16px;}
    .brand{letter-spacing:.18em;font-size:14px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>

<div class="hud-bg"><div class="grid"></div><div class="coreglow"></div><div class="lines"></div></div>
<span class="bk tl"></span><span class="bk tr"></span><span class="bk bl"></span><span class="bk br"></span>

<div class="masthead">
  <div class="wrap">
    <div class="brand"><a class="home" href="/" title="Back to deck">◂</a> CHRIS<b>·</b>OS <span class="sep">//</span> <span class="mod">PLANNER</span></div>
    <div class="controls">
      <input class="week-in" id="weekIn" placeholder="Week of..." aria-label="Week label">
      <div class="toggle" id="volToggle">
        <button data-vol="base" class="on">15 / wk</button>
        <button data-vol="push">21 / wk</button>
      </div>
      <span class="save-dot" id="saveDot">in memory</span>
      <span id="cgl-user"></span>
    </div>
  </div>
</div>

<div class="meter-sec">
  <div class="wrap">
    <div class="meter-head">
      <div class="eyebrow" id="ratioLine">Weekly plan</div>
      <div class="total mono" id="totalLine">0 planned</div>
    </div>
    <div class="meter-grid" id="meterGrid"></div>
  </div>
</div>

<div class="wrap">
  <div class="toolbar">
    <button class="btn primary" id="addBtn">+ Add video</button>
    <button class="btn" id="seedBtn">Load 15-video week</button>
    <button class="btn ghost" id="pillarBtn">Pillars</button>
    <div class="spacer"></div>
    <button class="btn ghost" id="exportBtn">Export markdown</button>
    <button class="btn ghost" id="backupBtn">Backup</button>
    <button class="btn ghost" id="restoreBtn">Restore</button>
    <button class="btn ghost" id="clearBtn">Clear</button>
    <input type="file" id="fileIn" accept=".json" style="display:none">
  </div>

  <div class="board" id="board"></div>
</div>

<!-- Pillar Manager Modal -->
<div class="pil-modal" id="pilModal">
  <div class="pil-card" id="pilCard"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- defaults ---------- */
const DEFAULT_PILLARS = [
  {key:"spine",  label:"Lead Gen",  role:"Authority",   color:"#E6B84D", types:["Educational how to","Ad teardown","Client win / proof","Hot take / myth bust","Offer / CTA"],   base:9,  push:13},
  {key:"faith",  label:"Faith",     role:"Faith",       color:"#7C82E8", types:["Principle in practice","Sunday reflection"],                                                     base:2,  push:3},
  {key:"fitness",label:"Fitness",   role:"Discipline",  color:"#FF7A52", types:["Discipline parallel","Routine / system"],                                                         base:2,  push:3},
  {key:"family", label:"Family",    role:"Legacy",      color:"#46C89B", types:["The why / legacy","Real life behind the scenes"],                                                base:2,  push:2},
];
const PALETTE = ["#E6B84D","#7C82E8","#FF7A52","#46C89B","#34D6D0","#C87CE8","#E87C7C","#7CE8C8","#E8C87C","#7C9AE8"];
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const SKELETON = [
  {day:"Mon",pillar:"spine",  type:"Ad teardown"},
  {day:"Mon",pillar:"spine",  type:"Educational how to"},
  {day:"Mon",pillar:"fitness",type:"Discipline parallel"},
  {day:"Tue",pillar:"spine",  type:"Educational how to"},
  {day:"Tue",pillar:"spine",  type:"Client win / proof"},
  {day:"Wed",pillar:"spine",  type:"Hot take / myth bust"},
  {day:"Wed",pillar:"fitness",type:"Routine / system"},
  {day:"Thu",pillar:"spine",  type:"Client win / proof"},
  {day:"Thu",pillar:"spine",  type:"Ad teardown"},
  {day:"Fri",pillar:"spine",  type:"Offer / CTA"},
  {day:"Fri",pillar:"faith",  type:"Principle in practice"},
  {day:"Sat",pillar:"family", type:"The why / legacy"},
  {day:"Sat",pillar:"spine",  type:"Educational how to"},
  {day:"Sun",pillar:"faith",  type:"Sunday reflection"},
  {day:"Sun",pillar:"family", type:"Real life behind the scenes"},
];

/* ---------- state ---------- */
let state = { week:"", volume:"base", pieces:[], pillars:null };
let nextId = 1;
const uid = () => "p"+(nextId++)+"_"+Math.random().toString(36).slice(2,6);

/* ---------- pillar helpers ---------- */
function pillarList(){ return (state.pillars && state.pillars.length) ? state.pillars : DEFAULT_PILLARS; }
function getPillar(key){ return pillarList().find(p=>p.key===key) || {key:key||"?",label:key||"?",role:"",color:"#7E8597",types:[],base:0,push:0}; }
function getTypes(key){ return getPillar(key).types || []; }

/* ---------- persistence ---------- */
const KEY = "cgl-planner-state-v1";
let canStore = (function(){try{localStorage.setItem("__cgl_t","1");localStorage.removeItem("__cgl_t");return true;}catch(e){return false;}})();
let saveTimer = null;

function loadState(){
  if(!canStore){ setSave("in memory"); return; }
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.pieces)){
        state = parsed;
        const maxN = state.pieces.reduce((m,p)=>{const n=parseInt((p.id||"").replace(/\D/g,""))||0;return Math.max(m,n);},0);
        nextId = maxN+1;
      }
    }
  }catch(e){ /* fresh */ }
  if(!state.pillars || !Array.isArray(state.pillars) || state.pillars.length===0){
    state.pillars = DEFAULT_PILLARS.map(p=>({...p,types:[...p.types]}));
  }
  setSave("saved");
}
function scheduleSave(){
  setSave("saving");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 400);
}
function doSave(){
  if(canStore){
    try{ localStorage.setItem(KEY, JSON.stringify(state)); setSave("saved"); }
    catch(e){ setSave("export to keep"); }
  } else { setSave("in memory"); }
  if(window.CGLCloud && window.CGLCloud.active) window.CGLCloud.cloudSave(state);
}
function setSave(t){
  const el = document.getElementById("saveDot");
  el.textContent = t;
  el.classList.toggle("live", t==="saved"||t==="saving");
}

/* ---------- helpers ---------- */
const wordCount = s => (s.trim().match(/\S+/g)||[]).length;
const hasDash = s => /—|–|(\s-\s)/.test(s);
function get(id){ return state.pieces.find(p=>p.id===id); }
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1700);
}

/* ---------- meter ---------- */
function renderMeter(){
  const pils = pillarList();
  const vol = state.volume==="push" ? "push" : "base";
  const totalTarget = pils.reduce((s,p)=>s+(p[vol]||0),0);

  const ratioEl = document.getElementById("ratioLine");
  if(ratioEl) ratioEl.textContent = `Weekly plan · goal ${totalTarget}+ posts`;

  const counts = {};
  pils.forEach(p=>counts[p.key]=0);
  state.pieces.forEach(p=>{ if(counts[p.pillar]!=null) counts[p.pillar]++; });

  document.getElementById("meterGrid").innerHTML = pils.map(P=>{
    const have=counts[P.key]||0, need=P[vol]||0;
    const pctFill=Math.min(100, need?(have/need*100):0);
    let cls="good", txt="on target";
    if(have<need){cls="under";txt="add "+(need-have);}
    else if(have>need){cls="over";txt="over by "+(have-need);}
    return `<div class="gauge" style="--c:${P.color}">
      <div class="gname">${P.label}</div>
      <div class="gcount">${have}<em> / ${need}</em></div>
      <div class="gbar"><div class="gfill" style="width:${pctFill}%"></div></div>
      <div class="gstat ${cls}">${txt}</div>
    </div>`;
  }).join("");

  const planned=state.pieces.length, totalEl=document.getElementById("totalLine");
  if(planned>=totalTarget){ totalEl.textContent=planned+" planned · goal hit ✓"; totalEl.classList.add("hit"); }
  else{ totalEl.textContent=planned+" of "+totalTarget+" · "+(totalTarget-planned)+" to goal"; totalEl.classList.remove("hit"); }
}

/* ---------- card ---------- */
function cardHTML(p){
  const P=getPillar(p.pillar);
  const opts=DAYS.map(d=>`<option ${d===p.day?"selected":""}>${d}</option>`).join("");
  const pillOpts=pillarList().map(pl=>`<option value="${pl.key}" ${pl.key===p.pillar?"selected":""}>${pl.label}</option>`).join("");
  const typeOpts=(getTypes(p.pillar)||[]).map(t=>`<option ${t===p.type?"selected":""}>${t}</option>`).join("");
  const titleTxt=p.hook?p.hook:(p.type||"Untitled piece");
  const wc=wordCount(p.script||""), hc=(p.hook||"").length;
  return `
  <div class="piece ${p.open?"open":""}" data-id="${p.id}" style="--c:${P.color}">
    <div class="p-head" data-act="toggle">
      <span class="chip day">${p.day}</span>
      <span class="chip pillar">${P.label}</span>
      <span class="ttl ${p.hook?"has":""}">${escapeHtml(titleTxt)}</span>
      <span class="status-dot ${p.status}" title="${p.status}"></span>
      <span class="caret">▶</span>
    </div>
    <div class="p-body">
      <div class="meta-row">
        <div class="field"><label>Day</label><select class="sel" data-f="day" style="min-width:90px">${opts}</select></div>
        <div class="field grow"><label>Pillar</label><select class="sel" data-f="pillar">${pillOpts}</select></div>
        <div class="field grow"><label>Type</label><select class="sel" data-f="type">${typeOpts}</select></div>
      </div>
      <div class="field" style="margin-top:14px">
        <label>Hook <span class="counter ${hookCls(hc)}" data-c="hook">${hc}/125</span></label>
        <input class="txt" data-f="hook" value="${escapeAttr(p.hook||"")}" placeholder="Bold scroll stopper, under 125 characters">
        <p class="hint">One punchy line. No dashes. Make a business owner stop.</p>
      </div>
      <div class="field" style="margin-top:14px">
        <label>Script <span class="counter ${wcCls(wc)}" data-c="script">${wc} words · aim 150-220</span> <span class="flag" data-flag="script" style="${hasDash(p.script||"")?"":"display:none"}">dash detected</span></label>
        <textarea class="area script" data-f="script" placeholder="Extract the core lesson. Do not retell the story. Short spaced paragraphs.">${escapeHtml(p.script||"")}</textarea>
      </div>
      <div class="field" style="margin-top:14px">
        <label>CTA <span class="flag" data-flag="cta" style="${hasDash(p.cta||"")?"":"display:none"}">dash detected</span></label>
        <input class="txt" data-f="cta" value="${escapeAttr(p.cta||"")}" placeholder='Comment driver. e.g. Comment "LEADS" and I will send it'>
      </div>
      <div class="p-foot">
        <div class="statseg" data-f="status">
          <button data-s="idea" class="${p.status==="idea"?"on":""}">Idea</button>
          <button data-s="scripted" class="${p.status==="scripted"?"on":""}">Scripted</button>
          <button data-s="ready" class="${p.status==="ready"?"on":""}">Ready</button>
        </div>
        <button class="del" data-act="del">Delete</button>
      </div>
    </div>
  </div>`;
}
function hookCls(n){ if(n===0)return""; if(n<=125)return"good"; return"warn"; }
function wcCls(n){ if(n===0)return""; if(n>=150&&n<=220)return"good"; return"warn"; }
function escapeHtml(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function escapeAttr(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

/* ---------- render board ---------- */
function renderBoard(){
  document.getElementById("board").innerHTML = DAYS.map(d=>{
    const dayPieces=state.pieces.filter(p=>p.day===d);
    const cards=dayPieces.length?dayPieces.map(cardHTML).join(""):`<div class="day-empty">No videos yet</div>`;
    return `<div class="day-group">
      <div class="day-head">
        <span class="day-name">${d}</span>
        <span class="day-count">${dayPieces.length} ${dayPieces.length===1?"video":"videos"}</span>
        <button class="day-add" data-addday="${d}">+ video</button>
      </div>
      ${cards}
    </div>`;
  }).join("");
  renderMeter();
}

/* ---------- in-place updates ---------- */
function updateCounter(card,p){
  const hc=(p.hook||"").length, wc=wordCount(p.script||"");
  const hCo=card.querySelector('[data-c="hook"]'); if(hCo){hCo.textContent=hc+"/125";hCo.className="counter "+hookCls(hc);}
  const sCo=card.querySelector('[data-c="script"]'); if(sCo){sCo.textContent=wc+" words · aim 150-220";sCo.className="counter "+wcCls(wc);}
  const sFlag=card.querySelector('[data-flag="script"]'); if(sFlag) sFlag.style.display=hasDash(p.script||"")?"":"none";
  const cFlag=card.querySelector('[data-flag="cta"]'); if(cFlag) cFlag.style.display=hasDash(p.cta||"")?"":"none";
  const ttl=card.querySelector(".ttl"); if(ttl){ttl.textContent=p.hook?p.hook:(p.type||"Untitled piece");ttl.classList.toggle("has",!!p.hook);}
}

/* ---------- board events ---------- */
document.getElementById("board").addEventListener("input",e=>{
  const card=e.target.closest(".piece"); if(!card)return;
  const p=get(card.dataset.id); if(!p)return;
  const f=e.target.dataset.f;
  if(f==="hook"||f==="script"||f==="cta"){ p[f]=e.target.value; updateCounter(card,p); scheduleSave(); }
});
document.getElementById("board").addEventListener("change",e=>{
  const card=e.target.closest(".piece"); if(!card)return;
  const p=get(card.dataset.id); if(!p)return;
  const f=e.target.dataset.f;
  if(f==="day"){ p.day=e.target.value; renderBoard(); scheduleSave(); }
  if(f==="type"){ p.type=e.target.value; updateCounter(card,p); scheduleSave(); }
  if(f==="pillar"){
    p.pillar=e.target.value;
    const types=getTypes(p.pillar);
    if(!types.includes(p.type)) p.type=types[0]||"";
    p.open=true;
    renderBoard(); scheduleSave();
  }
});
document.getElementById("board").addEventListener("click",e=>{
  const addBtn=e.target.closest("[data-addday]");
  if(addBtn){ addPieceToDay(addBtn.dataset.addday); return; }
  const card=e.target.closest(".piece"); if(!card)return;
  const p=get(card.dataset.id); if(!p)return;
  const act=e.target.closest("[data-act]")?.dataset.act;
  if(act==="toggle" && !e.target.closest("select,input,textarea,button")){
    p.open=!p.open; card.classList.toggle("open",p.open); scheduleSave(); return;
  }
  if(act==="del"){
    if(confirm("Delete this video?")){ state.pieces=state.pieces.filter(x=>x.id!==p.id); renderBoard(); scheduleSave(); }
    return;
  }
  const sBtn=e.target.closest(".statseg [data-s]");
  if(sBtn){
    p.status=sBtn.dataset.s;
    card.querySelectorAll(".statseg button").forEach(b=>b.classList.toggle("on",b.dataset.s===p.status));
    card.querySelector(".status-dot").className="status-dot "+p.status;
    scheduleSave();
  }
});

/* ---------- toolbar ---------- */
function newPiece(seed={}){
  const first=pillarList()[0]||{key:"spine",types:[]};
  const pilKey=seed.pillar||first.key;
  const types=getTypes(pilKey);
  return {id:uid(),day:seed.day||"Mon",pillar:pilKey,type:seed.type||types[0]||"",hook:"",script:"",cta:"",status:"idea",open:true};
}
function addPieceToDay(day){
  const p=newPiece({day}); state.pieces.push(p);
  renderBoard(); scheduleSave();
  const el=document.querySelector(`.piece[data-id="${p.id}"]`); if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
}
document.getElementById("addBtn").addEventListener("click",()=>addPieceToDay("Mon"));
document.getElementById("seedBtn").addEventListener("click",()=>{
  if(state.pieces.length && !confirm("Add the 15-video starter week to your current videos?")) return;
  const validKeys=new Set(pillarList().map(p=>p.key));
  SKELETON.forEach(s=>{ if(validKeys.has(s.pillar)) state.pieces.push(newPiece({...s,open:false})); });
  state.pieces.forEach(p=>p.open=false);
  renderBoard(); scheduleSave(); toast("Starter week loaded");
});
document.getElementById("clearBtn").addEventListener("click",()=>{
  if(confirm("Clear all pieces? Export first if you want to keep them.")){ state.pieces=[]; renderBoard(); scheduleSave(); }
});
document.getElementById("pillarBtn").addEventListener("click",()=>openPillarModal(null));

/* volume + week */
document.getElementById("volToggle").addEventListener("click",e=>{
  const b=e.target.closest("button[data-vol]"); if(!b)return;
  state.volume=b.dataset.vol;
  document.querySelectorAll("#volToggle button").forEach(x=>x.classList.toggle("on",x.dataset.vol===state.volume));
  renderMeter(); scheduleSave();
});
document.getElementById("weekIn").addEventListener("input",e=>{ state.week=e.target.value; scheduleSave(); });

/* ---------- export ---------- */
document.getElementById("exportBtn").addEventListener("click",()=>{
  const order={Mon:0,Tue:1,Wed:2,Thu:3,Fri:4,Sat:5,Sun:6};
  const sorted=[...state.pieces].sort((a,b)=>(order[a.day]-order[b.day]));
  let md=`# ChristianGetsLeads Content Plan\nWeek: ${state.week||"(untitled)"}  ·  Volume: ${state.volume==="push"?"Push 21":"Base 15"}  ·  ${state.pieces.length} pieces\n\n`;
  let curDay="";
  sorted.forEach(p=>{
    if(p.day!==curDay){ md+=`\n## ${p.day}\n\n`; curDay=p.day; }
    md+=`### ${getPillar(p.pillar).label} — ${p.type}  \`${p.status}\`\n\n**Hook:** ${p.hook||"_(empty)_"}\n\n**Script:**\n\n${p.script||"_(empty)_"}\n\n**CTA:** ${p.cta||"_(empty)_"}\n\n---\n\n`;
  });
  download((state.week||"cgl-plan").replace(/\s+/g,"-").toLowerCase()+".md", md, "text/markdown");
  toast("Markdown exported");
});
document.getElementById("backupBtn").addEventListener("click",()=>{
  download("cgl-planner-backup.json", JSON.stringify(state,null,2), "application/json");
  toast("Backup downloaded");
});
document.getElementById("restoreBtn").addEventListener("click",()=>document.getElementById("fileIn").click());
document.getElementById("fileIn").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const d=JSON.parse(r.result);
    if(d&&Array.isArray(d.pieces)){ state=d; nextId=state.pieces.length+1; syncUI(); renderBoard(); scheduleSave(); toast("Plan restored"); }
    else toast("Invalid file");
  }catch(err){toast("Could not read file");} };
  r.readAsText(f); e.target.value="";
});
function download(name,content,mime){
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),500);
}

/* ---------- pillar manager ---------- */
let editingPillarKey=null, draftTypes=[], draftColor=PALETTE[0], pilFormOpen=false;

function openPillarModal(editKey){
  if(editKey){
    editingPillarKey=editKey;
    const p=getPillar(editKey);
    draftTypes=[...(p.types||[])];
    draftColor=p.color||PALETTE[0];
    pilFormOpen=true;
  } else {
    editingPillarKey=null; draftTypes=[]; draftColor=PALETTE[0]; pilFormOpen=false;
  }
  renderPillarModal();
  document.getElementById("pilModal").classList.add("on");
}

function closePillarModal(){
  document.getElementById("pilModal").classList.remove("on");
  editingPillarKey=null; draftTypes=[]; draftColor=PALETTE[0]; pilFormOpen=false;
}

function renderPillarModal(){
  const pils=pillarList();
  const card=document.getElementById("pilCard");

  const typeChipsHtml=()=>draftTypes.map((t,i)=>
    `<span class="type-chip">${escapeHtml(t)}<button class="type-rx" data-tidx="${i}" title="Remove">×</button></span>`
  ).join("");

  const pilRows=pils.map(p=>{
    const cnt=state.pieces.filter(x=>x.pillar===p.key).length;
    const isEd=editingPillarKey===p.key;
    return `<div class="pil-row${isEd?" pil-editing":""}">
      <span class="pil-dot" style="background:${p.color}"></span>
      <div class="pil-info">
        <div class="pil-lbl">${escapeHtml(p.label)}</div>
        ${p.role?`<div class="pil-rl">${escapeHtml(p.role)}</div>`:""}
      </div>
      <span class="pil-cnt">${cnt} ${cnt===1?"video":"videos"}</span>
      <button class="pil-act" data-pil-edit="${escapeAttr(p.key)}">${isEd?"Editing…":"Edit"}</button>
      <button class="pil-act del" data-pil-del="${escapeAttr(p.key)}">Delete</button>
    </div>`;
  }).join("");

  const isEdit=!!editingPillarKey;
  const editP=isEdit?getPillar(editingPillarKey):null;

  const formHtml = pilFormOpen ? `
    <hr class="pil-divider">
    <div class="pil-form-title">${isEdit?"EDIT PILLAR":"NEW PILLAR"}</div>
    <div class="pil-form-row">
      <div class="field"><label>Name</label><input class="txt" id="pf-label" value="${escapeAttr(editP?editP.label:"")}" placeholder="e.g. Business" maxlength="32"></div>
      <div class="field"><label>Role</label><input class="txt" id="pf-role" value="${escapeAttr(editP?editP.role:"")}" placeholder="e.g. Strategy" maxlength="32"></div>
    </div>
    <div class="field" style="margin-bottom:14px">
      <label>Color</label>
      <div class="palette" id="pf-palette">${PALETTE.map(c=>`<span class="swatch${c===draftColor?" on":""}" style="background:${c}" data-clr="${escapeAttr(c)}" title="${escapeAttr(c)}"></span>`).join("")}</div>
    </div>
    <div class="types-area">
      <span class="types-lbl">Content Types</span>
      <div class="type-chips" id="pf-types">${typeChipsHtml()}</div>
      <div class="type-add-row">
        <input class="txt" id="pf-type-in" placeholder="Add a content type…" maxlength="60">
        <button class="btn ghost" id="pf-type-add" style="padding:10px 14px;white-space:nowrap">+ Add</button>
      </div>
    </div>
    <div class="tgt-row">
      <div class="field"><label>Base target / wk</label><input class="tgt-inp" type="number" id="pf-base" value="${editP!=null?(editP.base??2):2}" min="0" max="99"></div>
      <div class="field"><label>Push target / wk</label><input class="tgt-inp" type="number" id="pf-push" value="${editP!=null?(editP.push??3):3}" min="0" max="99"></div>
    </div>
    <div class="pil-form-btns">
      <button class="btn ghost" id="pf-cancel">Cancel</button>
      <button class="btn primary" id="pf-save">${isEdit?"Save changes":"Add Pillar"}</button>
    </div>
  ` : `<button class="btn" id="pf-new" style="width:100%;margin-top:4px">+ New Pillar</button>`;

  card.innerHTML=`
    <div class="pil-hd">
      <h2>Manage Pillars</h2>
      <button class="pil-close-btn" id="pilCloseBtn">✕</button>
    </div>
    <div class="pil-list">${pilRows}</div>
    ${formHtml}
  `;

  card.querySelector("#pilCloseBtn").addEventListener("click",closePillarModal);

  if(!pilFormOpen){
    card.querySelector("#pf-new").addEventListener("click",()=>{ pilFormOpen=true; renderPillarModal(); card.querySelector("#pf-label")?.focus(); });
  }

  card.querySelectorAll("[data-pil-edit]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const key=btn.dataset.pilEdit;
      if(editingPillarKey===key){ editingPillarKey=null; draftTypes=[]; draftColor=PALETTE[0]; pilFormOpen=false; }
      else { editingPillarKey=key; const p=getPillar(key); draftTypes=[...(p.types||[])]; draftColor=p.color||PALETTE[0]; pilFormOpen=true; }
      renderPillarModal();
      if(pilFormOpen) card.querySelector("#pf-label")?.focus();
    });
  });

  card.querySelectorAll("[data-pil-del]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const key=btn.dataset.pilDel;
      const P=getPillar(key);
      const cnt=state.pieces.filter(x=>x.pillar===key).length;
      const fallback=pillarList().find(p=>p.key!==key);
      const warn=cnt>0?` ${cnt} video${cnt>1?"s":""} will be reassigned to "${fallback?fallback.label:"(none)"}".`:"";
      if(!confirm(`Delete "${P.label}"?${warn}`)) return;
      if(!state.pillars) state.pillars=DEFAULT_PILLARS.map(p=>({...p,types:[...p.types]}));
      if(cnt>0&&fallback){
        state.pieces.forEach(p=>{
          if(p.pillar===key){ p.pillar=fallback.key; if(!getTypes(fallback.key).includes(p.type)) p.type=getTypes(fallback.key)[0]||""; }
        });
      }
      state.pillars=state.pillars.filter(p=>p.key!==key);
      if(editingPillarKey===key){ editingPillarKey=null; draftTypes=[]; draftColor=PALETTE[0]; }
      renderPillarModal(); renderBoard(); scheduleSave();
      toast(`"${P.label}" deleted`);
    });
  });

  card.querySelectorAll(".swatch").forEach(sw=>{
    sw.addEventListener("click",()=>{
      draftColor=sw.dataset.clr;
      card.querySelectorAll(".swatch").forEach(s=>s.classList.toggle("on",s.dataset.clr===draftColor));
    });
  });

  const typesEl=card.querySelector("#pf-types");
  typesEl.addEventListener("click",e=>{
    const rx=e.target.closest(".type-rx"); if(!rx)return;
    draftTypes.splice(parseInt(rx.dataset.tidx),1);
    typesEl.innerHTML=typeChipsHtml();
  });

  const typeIn=card.querySelector("#pf-type-in");
  const addType=()=>{
    const val=typeIn.value.trim();
    if(!val){ typeIn.focus(); return; }
    if(draftTypes.includes(val)){ toast("Already added"); typeIn.focus(); return; }
    draftTypes.push(val); typesEl.innerHTML=typeChipsHtml(); typeIn.value=""; typeIn.focus();
  };
  card.querySelector("#pf-type-add").addEventListener("click",addType);
  typeIn.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();addType();} });

  card.querySelector("#pf-cancel").addEventListener("click",()=>{
    editingPillarKey=null; draftTypes=[]; draftColor=PALETTE[0]; pilFormOpen=false; renderPillarModal();
  });

  card.querySelector("#pf-save").addEventListener("click",()=>{
    const label=card.querySelector("#pf-label").value.trim();
    const role=card.querySelector("#pf-role").value.trim();
    const base=Math.max(0,parseInt(card.querySelector("#pf-base").value)||0);
    const push=Math.max(0,parseInt(card.querySelector("#pf-push").value)||0);
    if(!label){ card.querySelector("#pf-label").focus(); toast("Name required"); return; }
    if(!state.pillars) state.pillars=DEFAULT_PILLARS.map(p=>({...p,types:[...p.types]}));
    if(editingPillarKey){
      const idx=state.pillars.findIndex(p=>p.key===editingPillarKey);
      if(idx>=0) state.pillars[idx]={...state.pillars[idx],label,role,color:draftColor,types:[...draftTypes],base,push};
      toast(`"${label}" updated`);
    } else {
      state.pillars.push({key:"pl_"+Math.random().toString(36).slice(2,8),label,role,color:draftColor,types:[...draftTypes],base,push});
      toast(`"${label}" added`);
    }
    editingPillarKey=null; draftTypes=[]; draftColor=PALETTE[0]; pilFormOpen=false;
    renderPillarModal(); renderBoard(); scheduleSave();
  });

  document.getElementById("pilModal").addEventListener("click",e=>{
    if(e.target===document.getElementById("pilModal")) closePillarModal();
  },{once:true});
}

/* ---------- boot ---------- */
function syncUI(){
  if(!["base","push"].includes(state.volume)) state.volume="base";
  if(!state.pillars||!state.pillars.length) state.pillars=DEFAULT_PILLARS.map(p=>({...p,types:[...p.types]}));
  document.getElementById("weekIn").value=state.week||"";
  document.querySelectorAll("#volToggle button").forEach(x=>x.classList.toggle("on",x.dataset.vol===state.volume));
}
function bootLocal(){
  loadState();
  if(!state.pieces.length){ SKELETON.forEach(s=>state.pieces.push(newPiece({...s,open:false}))); }
  syncUI();
  renderBoard();
}
function hydrate(remote){
  if(remote&&Array.isArray(remote.pieces)){
    state=remote;
    const maxN=state.pieces.reduce((m,p)=>{const n=parseInt((p.id||"").replace(/\D/g,""))||0;return Math.max(m,n);},0);
    nextId=maxN+1;
  }
  if(!state.pillars||!state.pillars.length) state.pillars=DEFAULT_PILLARS.map(p=>({...p,types:[...p.types]}));
  syncUI();
  renderBoard();
}
window.CGL_APP = { docId:"planner", bootLocal, hydrate, getState:()=>state, setStatus:setSave };
</script>

<script>
  if (window.navigator.standalone) {
    document.addEventListener('click', function(e) {
      var a = e.target.closest('a[href]');
      if (!a) return;
      try { var u = new URL(a.href); if (u.origin === location.origin) { e.preventDefault(); location.href = a.href; } } catch(x){}
    }, true);
  }
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
